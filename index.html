<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字名片：[你的名字] 的交互空间</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 顶部区域：沉浸式照片轮播 -->
    <section id="hero">
        <div class="hero-carousel">
            <!-- 照片将通过 JavaScript 动态添加 -->
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="user-name">[你的名字]</h1>
            <p id="user-bio">设计师 | 开发者 | 终身学习者</p>
        </div>
        <div class="carousel-dots">
            <!-- 导航点将通过 JavaScript 动态添加 -->
        </div>
    </section>

    <!-- 2. 中部核心：悬浮式 AI 对话助手 -->
    <div id="ai-companion">
        <div id="ai-icon">
            <!-- AI 头像图标 -->
        </div>
        <div id="ai-chat-window" class="hidden">
            <div class="chat-header">
                <span>AI 助手</span>
                <button id="close-chat">-</button>
            </div>
            <div class="chat-body">
                <!-- 聊天内容 -->
            </div>
            <div class="chat-input">
                <input type="text" placeholder="输入你的问题...">
                <button>发送</button>
            </div>
        </div>
    </div>

    <!-- 新增：中部互动卡片区域 -->
    <section id="interactive-cards">
        <div class="cards-container">
            <!-- 左侧卡片网格 -->
            <div class="card-grid-left">
                <div class="card">
                    <div class="card-image">
                        <img src="https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?q=80&w=2070&auto=format&fit=crop" alt="我的作品">
                    </div>
                    <div class="card-content">
                        <h3>我的作品</h3>
                        <p>2025 年设计的品牌视觉方案。</p>
                        <div class="card-details">
                            <p>这里是作品的详细介绍，默认隐藏，点击后展开。详细内容可以包括项目背景、设计理念、使用的工具和技术等等。</p>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-image">
                        <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=2070&auto=format&fit=crop" alt="我的经历">
                    </div>
                    <div class="card-content">
                        <h3>我的经历</h3>
                        <p>在 XYZ 公司担任前端开发。</p>
                         <div class="card-details">
                            <p>这里是经历的详细介绍，默认隐藏，点击后展开。可以描述您在该公司的主要职责、参与的项目以及取得的成就。</p>
                        </div>
                    </div>
                </div>
                <!-- 您可以根据需要在这里添加更多卡片 -->
            </div>
            <!-- 右侧内容区域 (待定) -->
            <div class="content-right">
                <!-- 根据您的设计，右侧 30% 的内容将在这里添加 -->
            </div>
        </div>
    </section>

    <!-- 3. 底部区域：社交连接枢纽 -->
    <footer id="social-hub">
        <div class="footer-content">
            <p>&copy; 2026 [你的名字]</p>
            <div class="social-links">
                <!-- 社交媒体图标将通过 JavaScript 动态添加 -->
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
